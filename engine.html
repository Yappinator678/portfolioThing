<!DOCTYPE html>
<html lang = "en">

    <head>
        <meta charset="UTF-8">
        <title>rendering engine</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <canvas id = "myCanvas"></canvas>


        <div id = "controls">
            <label for="fov">Fov:</label>
            <input type="range" id="fov" min="30" max="120" value="90">
            <output id="fovReading">90</output>

            x: <span id="xReading">0</span>
            z: <span id = "zReading">0</span>
        </div>
        <script src="script.js"></script>
    </body>

</html>
